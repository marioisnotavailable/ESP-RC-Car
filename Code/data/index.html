<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESP‑RC‑Car Wi‑Fi Setup</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container">
    <h2>ESP‑RC‑Car Wi‑Fi Setup</h2>

    <section class="card">
      <h3>Add Wi‑Fi</h3>
      <form id="add-form">
        <label>SSID<br /><input id="ssid" name="ssid" required /></label><br />
        <label>Password<br /><input id="pass" name="pass" type="password" /></label><br />
        <button type="submit">Save</button>
      </form>
      <div id="add-msg" class="msg"></div>
    </section>

    <section class="card">
      <div class="row">
        <h3>Nearby Networks</h3>
        <button id="scan-btn" class="right">Scan Wi‑Fi</button>
      </div>
      <div class="hint">Scanning can briefly disrupt AP; initial results were scanned at startup.</div>
      <table id="scan-table">
        <thead><tr><th>SSID</th><th>RSSI</th><th>Enc</th><th>Pick</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="card">
      <h3>Saved Networks</h3>
      <table id="saved-table">
        <thead><tr><th>#</th><th>SSID</th><th>Action</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="card">
      <form id="reboot-form"><button type="submit">Reboot</button></form>
    </section>

    <section class="card">
      <h3>ADC Monitor</h3>
      <p><strong>V_ADC (calibrated):</strong> <code id="adc-vAdc">--</code> V</p>
      <p><strong>V_Battery:</strong> <code id="adc-vBatt">--</code> V</p>
      <p><strong>Samples:</strong> <code id="adc-samples">--</code></p>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
