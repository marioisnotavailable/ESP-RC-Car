<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>RC-Car Control</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root{
    --stick-size: 220px;
    --knob-size: 88px;
    --gap: 48px;
  }
  @media (max-width: 700px){
    :root{
      --stick-size: 180px;
      --knob-size: 72px;
      --gap: 28px;
    }
  }

  html, body { height:100%; }
  body {
    margin:0; background:#000; color:#fff; font-family:sans-serif;
    display:flex; flex-direction:column;
  }

  header { text-align:center; padding:18px 12px 6px; }
  h2 { margin:0; }

  /* Hauptbereich: Sticks perfekt zentriert */
  .stage {
    flex:1;
    display:flex;
    align-items:center;     /* vertikal zentriert */
    justify-content:center; /* horizontal zentriert */
    gap: var(--gap);
    flex-wrap:wrap;
    padding: 12px;
  }

  .stick {
    width:var(--stick-size);
    height:var(--stick-size);
    background:#1f1f1f;
    border-radius:50%;
    position:relative;
    touch-action:none; user-select:none;
    box-shadow: inset 0 0 20px rgba(255,255,255,0.05);
  }
  .knob {
    width:var(--knob-size);
    height:var(--knob-size);
    background:#7a7a7a;
    border-radius:50%;
    position:absolute;
    left:50%; top:50%;
    transform: translate(-50%,-50%); /* Start exakt Mitte */
    transition: transform 0.05s linear;
    box-shadow: 0 8px 18px rgba(0,0,0,0.35), inset 0 0 10px rgba(255,255,255,0.08);
  }

  .info { text-align:center; color:#a9b7c6; line-height:1.45; padding: 8px 12px 18px; }
  code { color:#d0d0d0; }
  .status { margin-top:8px; font-size:14px; color:#9ad; }
</style>
</head>
<body>
  <header><h2>RC Car Controller</h2></header>

  <main class="stage">
    <div id="stick-throttle" class="stick"><div class="knob" id="knob-thr"></div></div>
    <div id="stick-steer"    class="stick"><div class="knob" id="knob-ste"></div></div>
  </main>

  <div class="info">
    <p><b>Steuerung:</b> Touch-Sticks, Tastatur (<code>W/S</code> vor/zurück, <code>A/D</code> links/rechts)<br>
       <b>Gamepad:</b> linker Stick = Lenkung, <b>R2</b> = vorwärts, <b>L2</b> = rückwärts</p>
    <div class="status" id="gpStatus">Gamepad: nicht verbunden</div>
    <div class="status" id="batteryStatus">Batterie: --</div>
  </div>

<script>
/*** === WebSocket === ***/
const WS_URL = "ws://192.168.4.1:81/";
let ws;
function connectWS(){
  ws = new WebSocket(WS_URL);
  ws.onopen  = ()=> console.log("WS connected");
  ws.onclose = ()=> setTimeout(connectWS, 1000);
  ws.onmessage = (event)=>{
    const msg = event.data;
    // Parse ADC message: "ADC:vAdc,vBatt,samples" (e.g., "ADC:3.058,8.56,5211")
    if (msg.startsWith("ADC:")) {
      const parts = msg.substring(4).split(',');
      if (parts.length === 3) {
        const vBatt = parseFloat(parts[1]);
        // Calculate battery percentage: 8.39V = 100%, 7.5V = 0%
        const BATT_MAX_VOLTAGE = 8.39;
        const BATT_MIN_VOLTAGE = 7.5;
        const battPercent = Math.round(((vBatt - BATT_MIN_VOLTAGE) / (BATT_MAX_VOLTAGE - BATT_MIN_VOLTAGE)) * 100);
        const battPercentClamped = Math.max(0, Math.min(100, battPercent));
        
        if (!isNaN(battPercentClamped)) {
          document.getElementById("batteryStatus").textContent = `Batterie: ${battPercentClamped}%`;
          // Color coding: >= 50% green, 20-50% orange, < 20% red (critical)
          const battEl = document.getElementById("batteryStatus");
          if (battPercentClamped < 20) {
            battEl.style.color = "#f99"; // Red - critical/deep discharge warning
          } else if (battPercentClamped < 50) {
            battEl.style.color = "#fa0"; // Orange - warning
          } else {
            battEl.style.color = "#9ad"; // Cyan - ok
          }
        }
      }
    }
  };
}
connectWS();

function send(thr, st, flags=0){
  if(ws && ws.readyState === 1){
    ws.send(`${Math.round(thr)},${Math.round(st)},${flags}`);
  }
}

/*** === gemeinsame Steuergrößen === ***/
let throttle = 0;   // -1000..+1000
let steer    = 0;   // -1000..+1000
const MAXVAL = 1000;

/*** === Deadzone & Glättung === ***/
const DZ      = 0.08;
const ALPHA_S = 0.30;
const ALPHA_T = 0.30;
let steerFilt = 0;
let thrFilt   = 0;

function applyDeadzone(v, dz=DZ){
  const a = Math.abs(v);
  if(a < dz) return 0;
  const s = (a - dz) / (1 - dz);
  return Math.sign(v) * s;
}

/*** === Touch-Sticks === ***/
function setupStick(id, verticalOnly){
  const stick = document.getElementById(id);
  const knob  = stick.querySelector(".knob");
  let r, cx, cy;

  function updateGeom(){
    const rect = stick.getBoundingClientRect();
    r = rect.width/2;
    cx = rect.left + r;
    cy = rect.top  + r;
  }
  window.addEventListener("resize", updateGeom);
  window.addEventListener("scroll", updateGeom);
  updateGeom();

  stick.addEventListener("touchmove", e=>{
    e.preventDefault();
    const t = e.touches[0];
    const dx = t.clientX - cx;
    const dy = t.clientY - cy;

    if(verticalOnly){
      const val = -(dy / r); // -1..+1
      throttle = Math.max(-1, Math.min(1, val)) * MAXVAL;
      knob.style.transform = `translate(-50%,-50%) translate(0px, ${(dy/r)*r}px)`;
    } else {
      const val = (dx / r);
      steer = Math.max(-1, Math.min(1, val)) * MAXVAL;
      knob.style.transform = `translate(-50%,-50%) translate(${(dx/r)*r}px, 0px)`;
    }
  }, {passive:false});

  stick.addEventListener("touchend", ()=>{
    if(verticalOnly){ throttle = 0; }
    else { steer = 0; }
    knob.style.transform = `translate(-50%,-50%)`;
  });
}

setupStick("stick-throttle", true);
setupStick("stick-steer", false);

/*** === Tastatur (WASD) === ***/
const KEY_STEP = 120;
const keys = {w:false, s:false, a:false, d:false};
window.addEventListener("keydown", e=>{
  switch(e.key.toLowerCase()){
    case "w": keys.w = true; break;
    case "s": keys.s = true; break;
    case "a": keys.a = true; break;
    case "d": keys.d = true; break;
  }
});
window.addEventListener("keyup", e=>{
  switch(e.key.toLowerCase()){
    case "w": keys.w = false; break;
    case "s": keys.s = false; break;
    case "a": keys.a = false; break;
    case "d": keys.d = false; break;
  }
});

/*** === Gamepad Support === ***/
let haveGamepad = false;
let gpIndex = -1;
const gpStatusEl = document.getElementById("gpStatus");

function readGamepad(){
  const gps = navigator.getGamepads ? navigator.getGamepads() : [];
  const gp  = gps[gpIndex] || null;
  if(!gp) return { steer: null, thr: null };

  let steerAxis = gp.axes && gp.axes.length > 0 ? gp.axes[0] : 0; // -1..+1
  let r2 = 0, l2 = 0;

  if (gp.buttons && gp.buttons.length >= 8) {
    r2 = Math.max(r2, gp.buttons[7].value || 0);
    l2 = Math.max(l2, gp.buttons[6].value || 0);
  }
  if (gp.axes && gp.axes.length >= 6) {
    let aR2 = gp.axes[5], aL2 = gp.axes[4];
    if (typeof aR2 === "number") r2 = Math.max(r2, (aR2 <= 1 && aR2 >= -1) ? (aR2 + 1)/2 : aR2);
    if (typeof aL2 === "number") l2 = Math.max(l2, (aL2 <= 1 && aL2 >= -1) ? (aL2 + 1)/2 : aL2);
  }

  steerAxis = applyDeadzone(steerAxis);
  const thrAxis = r2 - l2;

  return { steer: steerAxis * MAXVAL, thr: thrAxis * MAXVAL };
}

window.addEventListener("gamepadconnected", (e)=>{
  haveGamepad = true;
  gpIndex = e.gamepad.index;
  gpStatusEl.textContent = `Gamepad: verbunden (${e.gamepad.id})`;
});
window.addEventListener("gamepaddisconnected", (e)=>{
  if (e.gamepad.index === gpIndex) {
    haveGamepad = false; gpIndex = -1;
    gpStatusEl.textContent = "Gamepad: nicht verbunden";
  }
});

/*** === 50 Hz Sendeloop === ***/
const SEND_HZ = 50;
const SEND_MS = Math.round(1000 / SEND_HZ);
let lastSend = 0;

function loop(ts){
  // Tastatur
  if(keys.w) throttle = Math.min(MAXVAL, throttle + KEY_STEP);
  if(keys.s) throttle = Math.max(-MAXVAL, throttle - KEY_STEP);
  if(keys.a) steer    = Math.max(-MAXVAL, steer - KEY_STEP);
  if(keys.d) steer    = Math.min(MAXVAL,  steer + KEY_STEP);
  if(!keys.w && !keys.s) throttle *= 0.85;
  if(!keys.a && !keys.d) steer    *= 0.75;

  // Gamepad
  if (haveGamepad) {
    const gpVals = readGamepad();
    if (gpVals.steer !== null) steer   = gpVals.steer;
    if (gpVals.thr   !== null) throttle= gpVals.thr;
  }

  // Glättung
  steerFilt = ALPHA_S * steerFilt + (1-ALPHA_S) * steer;
  thrFilt   = ALPHA_T * thrFilt   + (1-ALPHA_T) * throttle;

  // Begrenzen
  steerFilt = Math.max(-MAXVAL, Math.min(MAXVAL, steerFilt));
  thrFilt   = Math.max(-MAXVAL, Math.min(MAXVAL, thrFilt));

  // Senden 50 Hz + Knobs visual mitführen
  if (ts - lastSend >= SEND_MS) {
    lastSend = ts;
    send(thrFilt, steerFilt, 0);
    document.getElementById("knob-thr").style.transform =
      `translate(-50%,-50%) translate(0px, ${(-thrFilt/MAXVAL)*(0.36*parseInt(getComputedStyle(document.documentElement).getPropertyValue('--stick-size')))}px)`;
    document.getElementById("knob-ste").style.transform =
      `translate(-50%,-50%) translate(${(steerFilt/MAXVAL)*(0.36*parseInt(getComputedStyle(document.documentElement).getPropertyValue('--stick-size')))}px, 0px)`;
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
