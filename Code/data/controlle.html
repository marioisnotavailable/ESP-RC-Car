<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>RC-Car Control</title>
<style>
  body { background:black; color:white; text-align:center; }
  #container { display:flex; justify-content:space-around; margin-top:30px; }
  .stick {
    width:200px; height:200px;
    background:#333; border-radius:50%;
    position:relative;
    touch-action:none;
  }
  .knob {
    width:80px; height:80px;
    background:#888; border-radius:50%;
    position:absolute; left:50%; top:50%;
    margin-left:-40px; margin-top:-40px;
  }
</style>
</head>
<body>
<h2>RC Car Controller</h2>
<div id="container">
  <div id="stick-throttle" class="stick"><div class="knob"></div></div>
  <div id="stick-steer" class="stick"><div class="knob"></div></div>
</div>

<script>
let ws = new WebSocket("ws://192.168.4.1:81/");
let throttle=0, steer=0;

window.onload = ()=>{
  setupStick("stick-throttle", true);  // nur Y-Achse
  setupStick("stick-steer", false);    // nur X-Achse
};

function setupStick(id, verticalOnly){
  let stick = document.getElementById(id);
  let knob  = stick.querySelector(".knob");
  let r = stick.clientWidth/2;
  let cx = stick.offsetLeft + r;
  let cy = stick.offsetTop + r;

  stick.addEventListener("touchmove", e=>{
    e.preventDefault();
    let t = e.touches[0];
    let dx = t.pageX - cx;
    let dy = t.pageY - cy;

    if(verticalOnly){
      // nur Y -> throttle
      let val = -(dy / r) * 1000;
      throttle = Math.max(-1000, Math.min(1000, val));
      knob.style.top = (50 + (dy/r)*50) + "%";
      knob.style.left = "50%";
    } else {
      // nur X -> steer
      let val = (dx / r) * 1000;
      steer = Math.max(-1000, Math.min(1000, val));
      knob.style.left = (50 + (dx/r)*50) + "%";
      knob.style.top = "50%";
    }
    send(throttle, steer, 0);
  }, false);

  stick.addEventListener("touchend", e=>{
    if(verticalOnly){ throttle=0; knob.style.top="50%"; }
    else { steer=0; knob.style.left="50%"; }
    send(throttle, steer, 0);
  }, false);
}

function send(thr, st, flags){
  if(ws.readyState === 1){
    ws.send(`${Math.round(thr)},${Math.round(st)},${flags}`);
  }
}
</script>
</body>
</html>
