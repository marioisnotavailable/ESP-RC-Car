; --- USB Serial upload (default) ---
[env:esp32dev]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
board_build.app_partition_name = app0
board_build.sdkconfig_path = sdkconfig.defaults
build_src_filter = +<*> -<factory_main.cpp>
build_flags =
    -DCONFIG_ESP_JTAG_MUX_SEL=0
    -DOTA_PASSWORD=\"esprccar\"
    -DCONFIG_ESP_WIFI_SLP_IRAM_OPT=1
#    -DARDUINO_USB_MODE=1
#    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    links2004/WebSockets@^2.7.0
    sparkfun/SparkFun STUSB4500@^1.1.5
    fastLED/FastLED@^3.10.3
    bblanchon/ArduinoJson@^7.4.3

; --- OTA upload: pio run -e ota -t upload ---
[env:ota]
extends = env:esp32dev
upload_protocol = espota
upload_port = esp-rc-car.local
upload_flags =
    --auth=esprccar

; --- Factory Recovery Firmware: pio run -e factory ---
[env:factory]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions.csv
board_build.sdkconfig_path = sdkconfig.defaults
build_flags =
    -DFACTORY_BUILD
    -DOTA_PASSWORD=\"esprccar\"
build_src_filter = +<factory_main.cpp>
lib_deps =
    bblanchon/ArduinoJson@^7.4.3