[env:esp32dev]
platform = espressif32
board = esp32s3wroom2
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
build_flags = 
lib_deps = 
	links2004/WebSockets@^2.7.0
	madhephaestus/WiiChuck@^0.4.1
